id: "16-bootorder-pxe"
title: "UEFI boot order: network/PXE first (opt-in, counters Windows reordering)"
scope: global
target: computer
requires: bootorder
description: >
  Uses a computer startup AND shutdown script (SYSTEM, on every boot and at shutdown)
  to set the UEFI boot order so that
  network/PXE boots FIRST (-> LINBO) and the Windows Boot Manager LAST. Otherwise Windows
  pushes its Boot Manager back to the front after every start, so the machines boot directly into
  Windows instead of LINBO. The script finds the network entry robustly via patterns
  (IPV4/IPV6/PXE/LAN/…, no hard-wired GUIDs), is locale-tolerant, idempotent
  (writes NVRAM only when needed) and never aborts the boot.
  OPT-IN: only active when 'bootorder_pxe_first: true' is set in site.yaml —
  boot-order changes are hardware-dependent and should first be tested on ONE device
  (log: %SystemRoot%\Temp\lmn-gpo-bootorder.log). Prerequisite: Fast Startup off
  (BIOS or package 05-wol), no BitLocker enforcing the Windows Boot Manager.
startup_scripts:
  - { file: 'bootorder-pxe-first.ps1' }
shutdown_scripts:
  # Additionally at shutdown (SYSTEM, last action): re-sets the order right
  # before powering off, in case Windows reordered it again during the session —
  # so the next boot is reliably PXE/LINBO.
  - { file: 'bootorder-pxe-first.ps1' }
