id: "16-bootorder-pxe"
title: "UEFI-Bootreihenfolge: Netzwerk/PXE zuerst (opt-in, gegen Windows-Umstellung)"
scope: global
target: computer
requires: bootorder
description: >
  Setzt per Computer-Start- UND Shutdown-Skript (SYSTEM, bei jedem Boot und beim Herunterfahren)
  die UEFI-Bootreihenfolge so, dass
  Netzwerk/PXE ZUERST bootet (-> LINBO) und der Windows Boot Manager ZULETZT. Windows drängt
  seinen Boot Manager sonst nach jedem Start wieder nach vorne, sodass die Rechner direkt in
  Windows statt in LINBO booten. Das Skript findet den Netzwerk-Eintrag robust über Muster
  (IPV4/IPV6/PXE/LAN/…, keine fest verdrahteten GUIDs), ist locale-tolerant, idempotent
  (schreibt die NVRAM nur wenn nötig) und bricht den Boot nie ab.
  OPT-IN: nur aktiv, wenn in der site.yaml 'bootorder_pxe_first: true' gesetzt ist —
  Boot-Order-Änderungen sind hardwareabhängig und sollten erst auf EINEM Gerät getestet
  werden (Log: %SystemRoot%\Temp\lmgpo-bootorder.log). Voraussetzung: Fast Startup aus
  (BIOS oder Paket 05-wol), kein BitLocker mit Windows-Boot-Manager-Zwang.
startup_scripts:
  - { file: 'bootorder-pxe-first.ps1' }
shutdown_scripts:
  # Zusätzlich beim Herunterfahren (SYSTEM, letzte Aktion): setzt die Reihenfolge direkt
  # vor dem Ausschalten neu, falls Windows sie während der Sitzung wieder umgestellt hat —
  # so ist der nächste Boot zuverlässig PXE/LINBO.
  - { file: 'bootorder-pxe-first.ps1' }
