id: "15-lockdown-student"
title: "Student lockdown: lock proxy & sensitive settings (role-student only)"
scope: global
target: user
filter_apply: ['@role-student']
description: >
  Prevents STUDENTS from changing security-/management-relevant Windows settings —
  above all the GPO-set proxy (the student cannot remove it). Pure
  HKCU policies, filtered exclusively to role-student and effective on shared
  machines via loopback (15-lockdown-base). TEACHERS and ADMINS are NOT affected (not in
  role-student) and may change everything. Deliberately kept moderate (no complete locking
  of the Control Panel); for stricter options see the README.
registry:
  # Proxy cannot be changed — takes effect in the Settings app AND in the Internet Options.
  # Core goal: the student cannot disable/redirect the assigned proxy.
  - { key: 'Software\Policies\Microsoft\Internet Explorer\Control Panel', name: Proxy, class: user, type: dword, data: 1 }
  # Hide the "Connections" tab (LAN/proxy settings) in the Internet Options.
  - { key: 'Software\Policies\Microsoft\Internet Explorer\Control Panel', name: ConnectionsTab, class: user, type: dword, data: 1 }
  # Automatic configuration (PAC/autoconfig) cannot be changed.
  - { key: 'Software\Policies\Microsoft\Internet Explorer\Control Panel', name: Autoconfig, class: user, type: dword, data: 1 }
  # Lock the Registry Editor (2 = interactive regedit locked, silent .reg/GPP still possible),
  # so that students cannot bypass the above locks via regedit.
  - { key: 'Software\Microsoft\Windows\CurrentVersion\Policies\System', name: DisableRegistryTools, class: user, type: dword, data: 2 }
