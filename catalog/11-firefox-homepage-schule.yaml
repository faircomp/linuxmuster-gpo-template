id: "11-firefox-homepage-schule"
title: "Firefox homepage (global default or per school, lockable)"
scope: school
target: computer
requires: firefox_homepage
description: >
  Sets the Firefox homepage. The URL comes from firefox_homepage (global) or
  firefox_homepage_by_school[<school>] (override per school). With
  firefox_homepage_locked (default: true) the homepage is fixed and
  locked against user changes — overrides an existing user setting.
  Linked per school; a school override wins over the global default
  (deeper OU). Only active when a URL is configured.
registry:
  - { key: 'Software\Policies\Mozilla\Firefox\Homepage', name: URL, type: sz, data: '@firefox-homepage' }
  - { key: 'Software\Policies\Mozilla\Firefox\Homepage', name: StartPage, type: sz, data: 'homepage' }
  - { key: 'Software\Policies\Mozilla\Firefox\Homepage', name: Locked, type: dword, data: '@firefox-homepage-locked' }
