id: "12-proxy-staff-schule"
title: "Proxy Staff (per school, role-staff only)"
scope: school
target: user
requires: proxy_school
filter_apply: ['@role-staff']
description: >
  Per-user WinINET proxy for STAFF: <school-proxy-host>:<staff-port>. Filtered
  exclusively to role-staff, loopback=merge, linked per school. Roaming-capable.
registry:
  - { key: 'Software\Microsoft\Windows\CurrentVersion\Internet Settings', name: ProxyEnable, class: user, type: dword, data: 1 }
  - { key: 'Software\Microsoft\Windows\CurrentVersion\Internet Settings', name: ProxyServer, class: user, type: sz, data: '@proxy-host:@proxy-port-staff' }
  - { key: 'Software\Microsoft\Windows\CurrentVersion\Internet Settings', name: ProxyOverride, class: user, type: sz, data: '@proxy-exceptions' }
