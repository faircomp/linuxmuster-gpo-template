id: "11-firefox"
title: "Firefox: first-run off, clean new tab, no ad clutter"
scope: global
target: computer
requires: firefox
description: >
  Firefox enterprise policies (HKLM\SOFTWARE\Policies\Mozilla\Firefox): first-run/
  onboarding & "What's new" off; new tab (Firefox Home) shows only search +
  shortcut tiles (TopSites), no sponsored tiles/Pocket/stories/
  snippets/weather; in-product ads/recommendations off; Pocket/telemetry/studies off.
  Only active when firefox_enabled is set. (Homepage: separate package 11-firefox-homepage-schule.)
registry:
  # --- First-Run / Onboarding ---
  - { key: 'Software\Policies\Mozilla\Firefox', name: OverrideFirstRunPage, type: sz, data: '' }
  - { key: 'Software\Policies\Mozilla\Firefox', name: OverridePostUpdatePage, type: sz, data: '' }
  - { key: 'Software\Policies\Mozilla\Firefox', name: DontCheckDefaultBrowser, type: dword, data: 1 }
  - { key: 'Software\Policies\Mozilla\Firefox', name: DisableProfileImport, type: dword, data: 1 }
  # --- New tab / Firefox Home: search + shortcuts only ---
  - { key: 'Software\Policies\Mozilla\Firefox\FirefoxHome', name: Search, type: dword, data: 1 }
  - { key: 'Software\Policies\Mozilla\Firefox\FirefoxHome', name: TopSites, type: dword, data: 1 }
  - { key: 'Software\Policies\Mozilla\Firefox\FirefoxHome', name: SponsoredTopSites, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\FirefoxHome', name: Highlights, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\FirefoxHome', name: Pocket, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\FirefoxHome', name: SponsoredPocket, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\FirefoxHome', name: Snippets, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\FirefoxHome', name: Stories, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\FirefoxHome', name: SponsoredStories, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\FirefoxHome', name: Weather, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\FirefoxHome', name: Locked, type: dword, data: 1 }
  # --- In-product ads / messages off (SkipOnboarding=1 is INVERTED!) ---
  - { key: 'Software\Policies\Mozilla\Firefox\UserMessaging', name: ExtensionRecommendations, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\UserMessaging', name: FeatureRecommendations, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\UserMessaging', name: UrlbarInterventions, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\UserMessaging', name: MoreFromMozilla, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\UserMessaging', name: FirefoxLabs, type: dword, data: 0 }
  - { key: 'Software\Policies\Mozilla\Firefox\UserMessaging', name: SkipOnboarding, type: dword, data: 1 }
  - { key: 'Software\Policies\Mozilla\Firefox\UserMessaging', name: Locked, type: dword, data: 1 }
  # --- Pocket / telemetry / studies off ---
  - { key: 'Software\Policies\Mozilla\Firefox', name: DisablePocket, type: dword, data: 1 }
  - { key: 'Software\Policies\Mozilla\Firefox', name: DisableTelemetry, type: dword, data: 1 }
  - { key: 'Software\Policies\Mozilla\Firefox', name: DisableFirefoxStudies, type: dword, data: 1 }
