id: "07-admins-schule"
title: "Schul-Admins: lokale Admins + RDP (je Schule)"
scope: school
target: computer
description: >
  Die Schul-Admins (Gruppe <präfix>admins) werden nur auf den Geräten IHRER
  Schule lokale Administratoren + "Remote Desktop Users" — verlinkt an
  OU=Devices der jeweiligen Schule. In Multischule-Setups pro Schule getrennt.
local_admins: ['@admins']
restricted_groups:
  - { member: '@admins', memberof: ['S-1-5-32-555'] }
