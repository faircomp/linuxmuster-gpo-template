id: "07-admins-schule"
title: "School admins: local admins + RDP (per school)"
scope: school
target: computer
description: >
  The school admins (group <prefix>admins) become local administrators +
  "Remote Desktop Users" only on the devices of THEIR school — linked to
  OU=Devices of the respective school. In multi-school setups separated per school.
local_admins: ['@admins']
restricted_groups:
  - { member: '@admins', memberof: ['S-1-5-32-555'] }
