id: "12-proxy-student-schule"
title: "Proxy Students (per school, role-student only)"
scope: school
target: user
requires: proxy_school
filter_apply: ['@role-student']
description: >
  Per-user WinINET proxy for STUDENTS: <school-proxy-host>:<student-port>. Filtered
  exclusively to role-student, loopback=merge, linked per school. Roaming-capable.
registry:
  - { key: 'Software\Microsoft\Windows\CurrentVersion\Internet Settings', name: ProxyEnable, class: user, type: dword, data: 1 }
  - { key: 'Software\Microsoft\Windows\CurrentVersion\Internet Settings', name: ProxyServer, class: user, type: sz, data: '@proxy-host:@proxy-port-student' }
  - { key: 'Software\Microsoft\Windows\CurrentVersion\Internet Settings', name: ProxyOverride, class: user, type: sz, data: '@proxy-exceptions' }
