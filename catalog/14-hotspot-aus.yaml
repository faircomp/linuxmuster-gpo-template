id: "14-hotspot-aus"
title: "Mobiler Hotspot verbieten (alle Rechner)"
scope: global
target: computer
description: >
  Verbietet den mobilen Windows-Hotspot / die Internetverbindungsfreigabe (ICS) auf
  ALLEN verwalteten Rechnern — ohne Ausnahme, auch Lehrer-Notebooks. Der Hotspot-Schalter
  wird ausgegraut. Umgesetzt über die ADMX-Richtlinie „Nutzung der Internetverbindungs-
  freigabe im DNS-Domänennetzwerk verbieten" (NC_ShowSharedAccessUI=0). Kein Filter →
  gilt für jedes Gerät in der Domäne.
registry:
  # "Prohibit use of Internet Connection Sharing on your DNS domain network" = Aktiviert
  # -> mobiler Hotspot / ICS gesperrt (Schalter ausgegraut, "von Organisation verwaltet").
  - { key: 'Software\Policies\Microsoft\Windows\Network Connections', name: NC_ShowSharedAccessUI, class: machine, type: dword, data: 0 }
