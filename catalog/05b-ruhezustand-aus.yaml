id: "05b-ruhezustand-aus"
title: "Hibernate off — except noPXE"
scope: global
target: computer
filter_deny: ['@nopxe']
description: >
  Completely disables hibernation via a startup script
  (powercfg /hibernate off) on LINBO/image machines. noPXE devices (e.g. teacher
  notebooks) are excluded via Deny-Apply and keep their hibernation.
  Fast Startup is independent of this and is turned off for ALL devices via 05-wol
  (HiberbootEnabled=0).
startup_scripts:
  - { file: 'hibernate-off.ps1' }
