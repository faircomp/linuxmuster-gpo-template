id: "02-updates"
title: "Windows-Update: aus für LINBO, an für noPXE"
scope: global
target: computer
description: >
  Automatische Updates deaktivieren für LINBO/Image-gepflegte Rechner.
  Die noPXE-Geräte (Gruppe d_nopxe) werden per Deny-Apply ausgenommen und
  fallen auf den Windows-Standard (Updates AN) zurück.
filter_deny: ['@nopxe']
registry:
  - { key: 'Software\Policies\Microsoft\Windows\WindowsUpdate\AU', name: NoAutoUpdate, class: machine, type: dword, data: 1 }
  - { key: 'Software\Policies\Microsoft\Windows\WindowsUpdate\AU', name: AUOptions, class: machine, type: dword, data: 2 }
  - { key: 'Software\Policies\Microsoft\Windows\WindowsUpdate\AU', name: NoAutoRebootWithLoggedOnUsers, class: machine, type: dword, data: 1 }
