id: "05-wol"
title: "Wake-on-LAN + Fast Startup aus"
scope: global
target: computer
description: >
  Fast Startup aus (HiberbootEnabled=0) für zuverlässiges echtes S5 und WoL,
  plus Startskript, das WoL/Magic-Packet auf allen NICs scharf schaltet und
  "Gerät zum Energiesparen ausschalten" deaktiviert. Gilt für ALLE Geräte
  (auch Notebooks), damit linbo-remote -w sie aufwecken kann.
registry:
  - { key: 'SYSTEM\CurrentControlSet\Control\Session Manager\Power', name: HiberbootEnabled, class: machine, type: dword, data: 0 }
startup_scripts:
  - { file: 'wol-arm.ps1' }
