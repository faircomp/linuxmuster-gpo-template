id: "05-wol"
title: "Wake-on-LAN + Fast Startup off"
scope: global
target: computer
description: >
  Fast Startup off (HiberbootEnabled=0) for reliable real S5 and WoL,
  plus a startup script that arms WoL/magic packet on all NICs and
  disables "Allow the computer to turn off this device to save power". Applies to
  ALL devices (including notebooks) so that linbo-remote -w can wake them.
registry:
  - { key: 'SYSTEM\CurrentControlSet\Control\Session Manager\Power', name: HiberbootEnabled, class: machine, type: dword, data: 0 }
startup_scripts:
  - { file: 'wol-arm.ps1' }
