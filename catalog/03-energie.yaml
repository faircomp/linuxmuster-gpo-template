id: "03-energie"
title: "Energie: kein Standby, Display aus nach 30 Min"
scope: global
target: computer
description: >
  Kein Ruhezustand/Standby (AC+DC=Nie), Display aus nach 30 Min, kein
  Hybrid-Standby. So bleiben die Rechner netzwerkerreichbar. Lehrer-Notebooks
  (@teachernb) sind per Deny-Apply ausgenommen (Windows-Standard-Energieplan).
filter_deny: ['@teachernb']
registry:
  # Standby-Timeout = Nie (SUB_SLEEP STANDBYIDLE 29f6c1db...)
  - { key: 'Software\Policies\Microsoft\Power\PowerSettings\29f6c1db-86da-48c5-9fdb-f2b67b1f44da', name: ACSettingIndex, class: machine, type: dword, data: 0 }
  - { key: 'Software\Policies\Microsoft\Power\PowerSettings\29f6c1db-86da-48c5-9fdb-f2b67b1f44da', name: DCSettingIndex, class: machine, type: dword, data: 0 }
  # Hibernate-Timeout = Nie (9d7815a6...)
  - { key: 'Software\Policies\Microsoft\Power\PowerSettings\9d7815a6-7ee4-497e-8888-515a05f02364', name: ACSettingIndex, class: machine, type: dword, data: 0 }
  - { key: 'Software\Policies\Microsoft\Power\PowerSettings\9d7815a6-7ee4-497e-8888-515a05f02364', name: DCSettingIndex, class: machine, type: dword, data: 0 }
  # Standby-Zustände (S1-S3) verbieten (abfc2519...)
  - { key: 'Software\Policies\Microsoft\Power\PowerSettings\abfc2519-3608-4c2a-94ea-171b0ed546ab', name: ACSettingIndex, class: machine, type: dword, data: 0 }
  - { key: 'Software\Policies\Microsoft\Power\PowerSettings\abfc2519-3608-4c2a-94ea-171b0ed546ab', name: DCSettingIndex, class: machine, type: dword, data: 0 }
  # Hybrid-Standby aus (94ac6d29...)
  - { key: 'Software\Policies\Microsoft\Power\PowerSettings\94ac6d29-73ce-41a6-809f-6363ba21b47e', name: ACSettingIndex, class: machine, type: dword, data: 0 }
  - { key: 'Software\Policies\Microsoft\Power\PowerSettings\94ac6d29-73ce-41a6-809f-6363ba21b47e', name: DCSettingIndex, class: machine, type: dword, data: 0 }
  # Display aus nach 1800 s (SUB_VIDEO VIDEOIDLE 3c0bc021...)
  - { key: 'Software\Policies\Microsoft\Power\PowerSettings\3c0bc021-c8a8-4e07-a973-6b14cbcb2b7e', name: ACSettingIndex, class: machine, type: dword, data: 1800 }
  - { key: 'Software\Policies\Microsoft\Power\PowerSettings\3c0bc021-c8a8-4e07-a973-6b14cbcb2b7e', name: DCSettingIndex, class: machine, type: dword, data: 1800 }
