id: "09-branding-schule"
title: "Branding: desktop & logon background (per school)"
scope: school
target: both
loopback: merge
requires: wallpaper
description: >
  Sets the desktop background (user) and lock/logon screen image (computer)
  per school. The image is copied from wallpapers/<school>.<ext> (fallback default.<ext>)
  to NETLOGON and referenced via UNC. Only active when an image is present.
  NOTE: The desktop background (wallpaper) applies on all editions; the
  lock/logon screen image (LockScreenImage) only on Windows 11
  Enterprise/Education — on Pro/Home LockScreenImage is silently ignored
  (there, place the image into the LINBO image if needed).
registry:
  - { key: 'Software\Microsoft\Windows\CurrentVersion\Policies\System', name: Wallpaper, class: user, type: sz, data: '@wallpaper' }
  - { key: 'Software\Microsoft\Windows\CurrentVersion\Policies\System', name: WallpaperStyle, class: user, type: sz, data: '10' }
  - { key: 'Software\Policies\Microsoft\Windows\Personalization', name: LockScreenImage, class: machine, type: sz, data: '@wallpaper' }
