id: "17-ntp-zeit"
title: "Time synchronization (W32Time) from the domain server"
scope: global
target: computer
description: >
  Enforces Windows time synchronization via GPO (W32Time). Default "Samba way" NT5DS:
  the clients synchronize over the domain from the DC (= the linuxmuster server), signed
  via its mssntp/ntpsigndsocket. The NtpServer value (server.<realm>,0x9) is also
  set, but is ignored under NT5DS — it only takes effect when switched to explicit NTP
  via site.yaml 'ntp_mode: ntp'.
  CORE FIX for "not all clocks are correct": MaxPos/NegPhaseCorrection = 0xFFFFFFFF
  (always correct) — otherwise W32Time refuses to correct large offsets (typical
  with dead BIOS/CMOS batteries, where the clock jumps far back).
  Applies only to clients (linked at OU=SCHOOLS); the DC is left untouched and keeps its
  own time source. Effective after gpupdate + reboot (or 'w32tm /config /update').
registry:
  # Enable NTP client + mode (Type: NT5DS = domain, NTP = explicit server)
  - { key: 'Software\Policies\Microsoft\W32Time\TimeProviders\NtpClient', name: Enabled, class: machine, type: dword, data: 1 }
  - { key: 'Software\Policies\Microsoft\W32Time\TimeProviders\NtpClient', name: Type, class: machine, type: sz, data: '@ntp-type' }
  - { key: 'Software\Policies\Microsoft\W32Time\TimeProviders\NtpClient', name: NtpServer, class: machine, type: sz, data: '@serverfqdn,0x9' }
  - { key: 'Software\Policies\Microsoft\W32Time\TimeProviders\NtpClient', name: SpecialPollInterval, class: machine, type: dword, data: 3600 }
  - { key: 'Software\Policies\Microsoft\W32Time\TimeProviders\NtpClient', name: CrossSiteSyncFlags, class: machine, type: dword, data: 2 }
  - { key: 'Software\Policies\Microsoft\W32Time\TimeProviders\NtpClient', name: ResolvePeerBackoffMinutes, class: machine, type: dword, data: 15 }
  - { key: 'Software\Policies\Microsoft\W32Time\TimeProviders\NtpClient', name: ResolvePeerBackoffMaxTimes, class: machine, type: dword, data: 7 }
  - { key: 'Software\Policies\Microsoft\W32Time\TimeProviders\NtpClient', name: EventLogFlags, class: machine, type: dword, data: 0 }
  # Always correct, even for large offsets (dead CMOS battery or similar)
  - { key: 'Software\Policies\Microsoft\W32Time\Config', name: MaxPosPhaseCorrection, class: machine, type: dword, data: 4294967295 }
  - { key: 'Software\Policies\Microsoft\W32Time\Config', name: MaxNegPhaseCorrection, class: machine, type: dword, data: 4294967295 }
