id: "07-admins-global"
title: "Global admins: local admins + RDP (everywhere)"
scope: global
target: computer
description: >
  global-admins become local administrators on ALL managed machines
  (GPP, additive) and members of the local "Remote Desktop Users" group
  (Restricted Groups __Memberof, additive → RDP logon allowed).
local_admins: ['@global-admins']
restricted_groups:
  - { member: '@global-admins', memberof: ['S-1-5-32-555'] }
