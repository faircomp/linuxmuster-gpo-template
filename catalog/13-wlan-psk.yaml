id: "13-wlan-psk"
title: "Wi-Fi PSK (student laptops, before login)"
scope: global
target: computer
requires: wlan_psk
filter_deny: ['@nopxe']
description: >
  Deploys the PSK Wi-Fi networks (all sites, from wlan_psk_networks) as machine profiles
  via startup script (netsh wlan add profile user=all) → connect BEFORE login.
  Applies to all managed devices EXCEPT teacher laptops (deny d_nopxe); those get
  Enterprise (13-wlan-enterprise). Only active when PSK networks are configured.
  SECURITY: the PSK is stored in the profile XML → readable in sysvol; consider
  filtering the GPO to Domain Computers.
wlan:
  mode: psk
