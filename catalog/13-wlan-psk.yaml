id: "13-wlan-psk"
title: "WLAN PSK (Schüler-Notebooks, vor dem Login)"
scope: global
target: computer
requires: wlan_psk
filter_deny: ['@nopxe']
description: >
  Rollt die PSK-WLANs (alle Standorte, aus wlan_psk_networks) als Maschinen-Profile
  per Startskript (netsh wlan add profile user=all) aus → verbinden VOR dem Login.
  Gilt für alle verwalteten Geräte AUSSER Lehrer-Notebooks (Deny d_nopxe); die
  bekommen Enterprise (13-wlan-enterprise). Nur aktiv, wenn PSK-Netze konfiguriert sind.
  SICHERHEIT: der PSK steht im Profil-XML → in sysvol lesbar; GPO ggf. auf Domain
  Computers filtern.
wlan:
  mode: psk
