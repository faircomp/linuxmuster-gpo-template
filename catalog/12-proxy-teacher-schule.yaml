id: "12-proxy-teacher-schule"
title: "Proxy teacher (per school, only role-teacher)"
scope: school
target: user
requires: proxy_school
filter_apply: ['@role-teacher']
description: >
  Sets the per-user WinINET proxy for TEACHERS: <school-proxy-host>:<teacher-port>.
  Linked to the Devices OU of the school (address follows the school), exclusively filtered
  to the global role-teacher group (port follows the role) and effective via Loopback=Merge.
  Roaming: a teacher from another school gets the same teacher proxy at this school.
registry:
  - { key: 'Software\Microsoft\Windows\CurrentVersion\Internet Settings', name: ProxyEnable, class: user, type: dword, data: 1 }
  - { key: 'Software\Microsoft\Windows\CurrentVersion\Internet Settings', name: ProxyServer, class: user, type: sz, data: '@proxy-host:@proxy-port-teacher' }
  - { key: 'Software\Microsoft\Windows\CurrentVersion\Internet Settings', name: ProxyOverride, class: user, type: sz, data: '@proxy-exceptions' }
