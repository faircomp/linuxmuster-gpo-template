id: "12-proxy-base"
title: "Proxy base: per-user + all browsers on system proxy"
scope: global
target: computer
requires: proxy
loopback: merge
description: >
  Foundation for the role-based proxy: enforces a per-USER proxy (not per-machine),
  sets Edge, Chrome and Firefox to the Windows system proxy (WinINET) → so that
  the per-role proxy assignment set in HKCU takes effect in all browsers. Loopback=Merge, so
  that the (role-filtered) user proxy GPOs apply after the machine/school.
registry:
  # Force WinINET per-USER (per-machine would ignore HKCU)
  - { key: 'Software\Policies\Microsoft\Windows\CurrentVersion\Internet Settings', name: ProxySettingsPerUser, type: dword, data: 1 }
  # Edge + Chrome: use system proxy (JSON policy)
  - { key: 'Software\Policies\Microsoft\Edge', name: ProxySettings, type: sz, data: '{"ProxyMode":"system"}' }
  - { key: 'Software\Policies\Google\Chrome', name: ProxySettings, type: sz, data: '{"ProxyMode":"system"}' }
  # Firefox: system proxy (inherits WinINET per-user), locked
  - { key: 'Software\Policies\Mozilla\Firefox\Proxy', name: Mode, type: sz, data: 'system' }
  - { key: 'Software\Policies\Mozilla\Firefox\Proxy', name: Locked, type: dword, data: 1 }
