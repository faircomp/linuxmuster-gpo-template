id: "00-datenschutz"
title: "Datenschutz / Telemetrie"
scope: global
target: both
loopback: merge
description: >
  Telemetrie, Werbe-ID, Aktivitätsverlauf, Standort, Feedback, Find-My-Device,
  Eingabe-Personalisierung, Copilot/Recall, Cloud-Sync abschalten.
dsgvo: >
  DSK-Beschluss zu Windows: Enterprise/Education + AllowTelemetry=0 (Security) +
  Restricted-Traffic-Baseline. Auf Pro wird 0 als 1 (Required) behandelt.
registry:
  - { key: 'Software\Policies\Microsoft\Windows\DataCollection', name: AllowTelemetry, class: machine, type: dword, data: 0 }
  - { key: 'Software\Policies\Microsoft\Windows\DataCollection', name: DoNotShowFeedbackNotifications, class: machine, type: dword, data: 1 }
  - { key: 'Software\Policies\Microsoft\Windows\DataCollection', name: LimitDiagnosticLogCollection, class: machine, type: dword, data: 1 }
  - { key: 'Software\Policies\Microsoft\Windows\DataCollection', name: DisableOneSettingsDownloads, class: machine, type: dword, data: 1 }
  - { key: 'Software\Policies\Microsoft\Windows\AdvertisingInfo', name: DisabledByGroupPolicy, class: machine, type: dword, data: 1 }
  - { key: 'Software\Policies\Microsoft\Windows\System', name: EnableActivityFeed, class: machine, type: dword, data: 0 }
  - { key: 'Software\Policies\Microsoft\Windows\System', name: PublishUserActivities, class: machine, type: dword, data: 0 }
  - { key: 'Software\Policies\Microsoft\Windows\System', name: UploadUserActivities, class: machine, type: dword, data: 0 }
  - { key: 'Software\Policies\Microsoft\Windows\LocationAndSensors', name: DisableLocation, class: machine, type: dword, data: 1 }
  - { key: 'Software\Policies\Microsoft\Windows\AppPrivacy', name: LetAppsAccessLocation, class: machine, type: dword, data: 2 }
  - { key: 'Software\Policies\Microsoft\FindMyDevice', name: AllowFindMyDevice, class: machine, type: dword, data: 0 }
  - { key: 'Software\Policies\Microsoft\InputPersonalization', name: AllowInputPersonalization, class: machine, type: dword, data: 0 }
  - { key: 'Software\Policies\Microsoft\InputPersonalization', name: RestrictImplicitTextCollection, class: machine, type: dword, data: 1 }
  - { key: 'Software\Policies\Microsoft\InputPersonalization', name: RestrictImplicitInkCollection, class: machine, type: dword, data: 1 }
  - { key: 'Software\Policies\Microsoft\Windows\WindowsAI', name: DisableAIDataAnalysis, class: machine, type: dword, data: 1 }
  - { key: 'Software\Policies\Microsoft\Windows\SettingSync', name: DisableSettingSync, class: machine, type: dword, data: 2 }
  - { key: 'Software\Policies\Microsoft\Windows\SettingSync', name: DisableSettingSyncUserOverride, class: machine, type: dword, data: 1 }
  # User-Kontext (via Loopback=Merge auf verwalteten Rechnern wirksam)
  - { key: 'Software\Policies\Microsoft\Windows\CloudContent', name: DisableTailoredExperiencesWithDiagnosticData, class: user, type: dword, data: 1 }
  - { key: 'Software\Policies\Microsoft\Windows\WindowsCopilot', name: TurnOffWindowsCopilot, class: user, type: dword, data: 1 }
